<div class="app-page page-user-cargar-gasto">
  <div id="userTopbarSlot"></div>

  <main class="app-main app-main--wide user-cargar-main">
    <section class="hero-panel user-cargar-hero">
      <h1 class="text-gradient">Cargar Nuevo Gasto</h1>
      <p class="text-muted mt-2">
        Registra manualmente o analiza un ticket con OCR para completar el formulario en segundos.
      </p>
      <div class="d-flex flex-wrap gap-2 mt-3">
        <a class="action-btn action-btn--ghost" href="#/usuario/historial">
          <i class="fa-solid fa-clock-rotate-left"></i>
          Ir al Historial
        </a>
        <button class="action-btn action-btn--primary js-dashboard-back" type="button">
          <i class="fa-solid fa-arrow-left"></i>
          Volver al Dashboard
        </button>
      </div>
    </section>

    <section class="user-cargar-grid">
      <article class="section-block">
        <h2 class="section-title">
          <i class="fa-solid fa-pen-to-square accent"></i>
          Carga Manual
        </h2>

        <form id="userExpenseForm" class="user-expense-form" novalidate>
          <div class="row g-3">
            <div class="col-md-7">
              <label class="form-label" for="expenseMerchant">Comercio</label>
              <input id="expenseMerchant" name="merchant" class="form-control" list="merchantSuggestions" required />
              <datalist id="merchantSuggestions"></datalist>
            </div>
            <div class="col-md-5">
              <label class="form-label" for="expenseAmount">Monto</label>
              <input id="expenseAmount" name="amount" type="number" min="1" step="0.01" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="expenseCategory">Categoria</label>
              <select id="expenseCategory" name="category" class="form-select" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="expensePaymentMethod">Metodo de pago</label>
              <select id="expensePaymentMethod" name="paymentMethod" class="form-select" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="expenseDate">Fecha</label>
              <input id="expenseDate" name="date" type="date" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="expenseReference">Referencia</label>
              <input
                id="expenseReference"
                name="reference"
                class="form-control"
                placeholder="Ticket, factura o nota interna"
              />
            </div>
            <div class="col-12">
              <label class="form-label" for="expenseDescription">Descripcion</label>
              <textarea
                id="expenseDescription"
                name="description"
                rows="3"
                class="form-control"
                placeholder="Ej: compra semanal, combustible, etc."
              ></textarea>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2 mt-3">
            <button class="action-btn action-btn--primary" type="submit">
              <i class="fa-solid fa-floppy-disk"></i>
              Guardar gasto
            </button>
            <button class="action-btn action-btn--ghost" id="clearExpenseFormButton" type="button">
              <i class="fa-solid fa-eraser"></i>
              Limpiar formulario
            </button>
          </div>
        </form>
      </article>

      <article class="section-block user-ocr-panel">
        <h2 class="section-title">
          <i class="fa-solid fa-receipt accent"></i>
          Carga por Ticket (OCR)
        </h2>
        <p class="text-muted mb-3">
          Sube una imagen del ticket para precompletar comercio, monto, fecha y categoria.
        </p>

        <label class="ticket-dropzone" for="expenseTicketFile">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span id="ticketFileName">Arrastra una imagen o selecciona un archivo</span>
        </label>
        <input id="expenseTicketFile" type="file" accept="image/*" class="app-hidden" />

        <button class="action-btn action-btn--primary mt-3" id="analyzeTicketButton" type="button">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          Analizar ticket
        </button>

        <article class="ocr-result app-hidden mt-3" id="ocrResultCard">
          <h3 class="info-card__title">
            <i class="fa-solid fa-check-circle accent"></i>
            Datos detectados
          </h3>
          <div class="ocr-result__rows" id="ocrResultRows"></div>
        </article>
      </article>
    </section>

    <section class="section-block">
      <h2 class="section-title">
        <i class="fa-solid fa-clock accent"></i>
        Ultimos gastos cargados
      </h2>
      <div class="recent-expense-list" id="recentExpenseList"></div>
    </section>

    <div id="appFooterSlot"></div>
  </main>

  <div id="userSidebarSlot"></div>
</div>
