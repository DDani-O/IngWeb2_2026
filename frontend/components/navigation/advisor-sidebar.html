<aside class="offcanvas offcanvas-start app-offcanvas" tabindex="-1" id="advisorSidebarOffcanvas" aria-labelledby="advisorSidebarOffcanvasLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="advisorSidebarOffcanvasLabel">Asesor</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column gap-2">
    <div class="sidebar-user-card">
      <span class="sidebar-user-card__avatar">{{advisorInitials}}</span>
      <div>
        <p class="sidebar-user-card__name">{{advisorName}}</p>
        <p class="sidebar-user-card__meta">Editar Perfil</p>
      </div>
    </div>

    <p class="sidebar-section-title mt-2">Navegacion</p>
    <a class="sidebar-link active" href="#/asesor/dashboard"><i class="fa-solid fa-house"></i>Dashboard</a>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorClientes" href="#/utils/placeholder"><i class="fa-solid fa-users"></i>Mis Clientes</a>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorInbox" href="#/utils/placeholder"><i class="fa-solid fa-inbox"></i>Bandeja de Entrada</a>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorReportes" href="#/utils/placeholder"><i class="fa-solid fa-file-lines"></i>Mis Comisiones</a>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorReportes" href="#/utils/placeholder"><i class="fa-solid fa-list-check"></i>Tareas Pendientes</a>

    <p class="sidebar-section-title mt-2">Acciones</p>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorReportes" href="#/utils/placeholder"><i class="fa-solid fa-user-pen"></i>Editar Perfil</a>
    <a class="sidebar-link js-placeholder-link" data-preset="advisorReportes" href="#/utils/placeholder"><i class="fa-solid fa-download"></i>Descargar Reportes</a>

    <div class="sidebar-spacer"></div>
    <button class="sidebar-link sidebar-logout" id="advisorLogoutButtonMobile" type="button">
      <i class="fa-solid fa-right-from-bracket"></i>Salir
    </button>
  </div>
</aside>
